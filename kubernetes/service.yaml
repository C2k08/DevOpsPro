apiVersion: v1
kind: Service
metadata:
  name: devopspro-app
  namespace: {{NAMESPACE}}
  labels:
    app: devopspro-app
    env: {{ENV}}
spec:
  selector:
    app: devopspro-app
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devopspro-app
  namespace: {{NAMESPACE}}
  labels:
    app: devopspro-app
    env: {{ENV}}
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
  - host: devopspro-{{ENV}}.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: devopspro-app
            port:
              number: 80