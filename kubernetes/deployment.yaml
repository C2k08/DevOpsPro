apiVersion: apps/v1
kind: Deployment
metadata:
  name: devopspro-app
  namespace: {{NAMESPACE}}
  labels:
    app: devopspro-app
    env: {{ENV}}
spec:
  replicas: {{REPLICAS}}
  selector:
    matchLabels:
      app: devopspro-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: devopspro-app
        env: {{ENV}}
    spec:
      containers:
      - name: devopspro-app
        image: devopspro-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        env:
        - name: NODE_ENV
          value: {{ENV}}
        - name: PORT
          value: "3000"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
      restartPolicy: Always