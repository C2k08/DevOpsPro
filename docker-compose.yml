version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: devopspro-app:latest
    container_name: devopspro-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - ./app:/app
      - /app/node_modules
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Ejemplo de base de datos (descomentando esto se agregaría)
